name: AI Code Review (PHP)

on:
  push:
    #paths:
      #- '**.php'
    branches:
      - main
  pull_request:
    #paths:
    #  - '**.php'
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      # 3. Install dependencies (nếu có composer)
      - name: Install dependencies
        run: composer install --no-progress || true

      # 4. Lấy diff chỉ file PHP
      - name: Get diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Running PR diff"
            git fetch origin ${{ github.base_ref }}
            git diff origin/${{ github.base_ref }} -- '*.php' > diff.txt
          else
            echo "Running push diff"
            git diff HEAD~1 HEAD -- '*.php' > diff.txt
          fi

      # 5. Debug diff (optional)
      - name: Show diff size
        run: wc -c diff.txt

      # 6. Run AI script
      - name: Run AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: php .github/scripts/ai_review.php

      # 7. Comment vào PR
      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');
      
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });

      # 8. Slack (optional)
      - name: Send Slack
        if: always()
        run: |
          if [ -f review.txt ] && [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
      
            REVIEW=$(cat review.txt | sed 's/"/\\"/g')
      
            curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"🤖 AI Code Review\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"$REVIEW\"
                  }
                }
              ]
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
      
          else
            echo "Skip Slack"
          fi

name: AI Code Review (PHP)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      # 3. Install dependencies (nếu có composer)
      - name: Install dependencies
        run: composer install --no-progress || true

      # 4. Lấy diff chỉ file PHP
      - name: Get diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} -- '*.php' > diff.txt

      # 5. Debug diff (optional)
      - name: Show diff size
        run: wc -c diff.txt

      # 6. Run AI script
      - name: Run AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: php .github/scripts/ai_review.php

      # 7. Comment vào PR
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });

      # 8. Slack (optional)
      - name: Send Slack
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"AI Review:\n$(cat review.txt)\"}" \
          ${{ secrets.SLACK_WEBHOOK }}
